<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
  position: relative;
  z-index: 3;
}

/* MENSAJE */
#mensaje {
  font-size: 22px;
  color: orange;
  text-shadow: 0 0 10px red;
  margin-bottom: 10px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  max-width: 280px;
  margin: 0 auto;
}

/* BOTÓN */
#boton {
  margin-top: 16px;
  padding: 12px 24px;
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(180deg, #ff4d4d, #990000);
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
  transition: transform 0.1s ease;
}

#boton:active {
  transform: scale(0.95);
}

/* CONTADOR */
#contador {
  margin-top: 12px;
  font-size: 18px;
  display: none;
}

/* TEXTO FINAL ARRIBA */
#texto {
  margin-top: 10px;
  font-size: 22px;
  opacity: 0;
  position: relative;
  z-index: 4;
  transition: opacity 1s ease;
}

/* FOTO */
#foto {
  width: 90%;
  max-width: 250px;
  border-radius: 15px;
  margin-top: 15px;
  opacity: 0;
  box-shadow: 0 0 15px rgba(255,255,255,0.4);
  transition: opacity 1s ease;
}

/* TEXTO AMOR */
#amor {
  margin-top: 15px;
  font-size: 20px;
  opacity: 0;
  transition: opacity 1s ease;
}

/* TIEMPO */
#tiempo {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0;
}

/* FONDO ROSAS */
#fondoRosas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url("rosa.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0;
  transition: opacity 1s ease;
  z-index: 2;
}

/* PERGAMINO */
#pergamino {
  position: fixed;
  inset: 0;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 30px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
  z-index: 999;
}

#pergamino.visible {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>

<body>

<div class="container">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>

  <img id="dragon" src="dragon.gif">

  <button id="boton">⚔️ ATACAR</button>

  <div id="contador">Golpea al dragón: 0 / 5</div>

  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>

  <img id="foto" src="foto.jpg">

  <div id="amor">Te amo muchoooo ❤️</div>

  <div id="tiempo">Tiempo: 10</div>
</div>

<div id="fondoRosas"></div>

<div id="pergamino">
  🏰 Has completado la misión…<br><br>
  (Aquí pondremos tu mensaje final 😏)
</div>

<script>
const mensaje = document.getElementById("mensaje");
const boton = document.getElementById("boton");
const contador = document.getElementById("contador");
const dragon = document.getElementById("dragon");
const texto = document.getElementById("texto");
const foto = document.getElementById("foto");
const amor = document.getElementById("amor");
const tiempoDiv = document.getElementById("tiempo");
const fondoRosas = document.getElementById("fondoRosas");
const pergamino = document.getElementById("pergamino");

let golpes = 0;
let tiempo = 10;
let intervalo = null;

// mensaje
setTimeout(() => {
  mensaje.style.opacity = "1";
}, 1500);

// juego
setTimeout(() => {
  mensaje.style.opacity = "0";
  boton.style.display = "inline-block";
  contador.style.display = "block";
}, 3500);

// atacar
boton.addEventListener("click", () => {
  golpes++;
  contador.textContent = `Golpea al dragón: ${golpes} / 5`;

  if (golpes >= 5) {
    boton.style.display = "none";
    contador.style.display = "none";
    dragon.style.display = "none";

    fondoRosas.style.opacity = "1";

    texto.style.opacity = "1";

    setTimeout(() => {
      foto.style.opacity = "1";
    }, 800);

    setTimeout(() => {
      amor.style.opacity = "1";
    }, 1500);

    setTimeout(() => {
      tiempoDiv.style.opacity = "1";

      intervalo = setInterval(() => {
        tiempo--;
        tiempoDiv.textContent = `Tiempo: ${tiempo}`;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          pergamino.classList.add("visible");
        }
      }, 1000);
    }, 2000);
  }
});
</script>

</body>
</html>
