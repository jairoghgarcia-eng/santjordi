<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  color: white;
}

/* CONTENEDOR */
.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  cursor: pointer;
}

/* CONTADOR GOLPES */
#contador {
  margin-top: 10px;
  font-size: 18px;
}

/* ROSA */
#rosa {
  width: 70%;
  opacity: 0;
  margin-top: 20px;
  filter: drop-shadow(0 0 15px red);
}

/* TEXTO FINAL */
#texto {
  margin-top: 15px;
  font-size: 20px;
  opacity: 0;
}

/* CONTADOR TIEMPO */
#tiempo {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0;
}

/* PERGAMINO FULL SCREEN */
#pergamino {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 30px;
  opacity: 0;
  z-index: 999;
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <div id="contador">Golpea al dragón: 0 / 5</div>

  <img id="rosa" src="rosa.png">
  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>

  <div id="tiempo">Tiempo: 10</div>
</div>

<div id="pergamino">
  <div>
    🏰 Has completado la misión...<br><br>
    (Aquí irá tu mensaje final 😏)
  </div>
</div>

<script>

let golpes = 0;
let juegoActivo = true;
let tiempo = 10;
let intervalo;

const dragon = document.getElementById("dragon");
const contador = document.getElementById("contador");
const rosa = document.getElementById("rosa");
const texto = document.getElementById("texto");
const tiempoDiv = document.getElementById("tiempo");
const pergamino = document.getElementById("pergamino");

// CLICK DRAGÓN
dragon.addEventListener("click", () => {
  if (!juegoActivo) return;

  golpes++;
  contador.innerText = "Golpea al dragón: " + golpes + " / 5";

  dragon.style.transform = "scale(0.9)";
  setTimeout(() => dragon.style.transform = "scale(1)", 100);

  if (golpes >= 5) {
    juegoActivo = false;

    // ocultar dragón y contador
    dragon.style.display = "none";
    contador.style.display = "none";

    // mostrar rosa y texto
    rosa.style.opacity = 1;
    texto.style.opacity = 1;

    // empezar contador DESPUÉS
    setTimeout(() => {
      tiempoDiv.style.opacity = 1;

      intervalo = setInterval(() => {
        tiempo--;
        tiempoDiv.innerText = "Tiempo: " + tiempo;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          mostrarPergamino();
        }
      }, 1000);

    }, 1000);
  }
});

// PERGAMINO
function mostrarPergamino() {
  pergamino.style.opacity = 1;
}

</script>

</body>
</html>
