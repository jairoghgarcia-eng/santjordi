<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  color: white;
  font-family: 'Georgia', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CONTENEDOR */
.container {
  position: relative;
  text-align: center;
  width: 90%;
  max-width: 300px;
}

/* IMÁGENES BASE */
img {
  width: 100%;
}

/* DRAGÓN */
#dragon {
  position: relative;
  z-index: 2;
  animation: fadeOut 2s ease forwards;
  animation-delay: 3s;
}

/* FUEGO (centrado encima del dragón) */
#fuego {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 120%;
  opacity: 0;
  z-index: 3;
  animation: fuegoAnim 2s ease forwards;
  animation-delay: 3s;
}

/* ROSA */
#rosa {
  position: relative;
  z-index: 2;
  opacity: 0;
  filter: drop-shadow(0 0 10px red);
  animation: aparecer 2s ease forwards;
  animation-delay: 5s;
}

/* TEXTO */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
  animation: aparecer 2s ease forwards;
  animation-delay: 7s;
}

/* ANIMACIONES */
@keyframes fadeOut {
  to { opacity: 0; transform: scale(0.8); }
}

@keyframes fuegoAnim {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <img id="fuego" src="fuego.gif">
  <img id="rosa" src="rosa.png">
  <div id="texto">Feliç Sant Jordi, Andrea ❤️🌹</div>
</div>

</body>
</html>
