<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  color: white;
  text-align: center;
  overflow: hidden;
  font-family: 'Georgia', serif;
}

/* CONTENEDOR */
.container {
  position: relative;
  top: 50%;
  transform: translateY(-50%);
}

/* DRAGÓN */
#dragon {
  width: 260px;
  animation: fadeOut 2s ease forwards;
  animation-delay: 3s;
}

/* FUEGO */
#fuego {
  width: 260px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: fuegoAnim 2s ease forwards;
  animation-delay: 3s;
}

/* ROSA */
#rosa {
  width: 200px;
  opacity: 0;
  animation: aparecer 2s ease forwards;
  animation-delay: 5s;
}

/* TEXTO */
#texto {
  margin-top: 20px;
  font-size: 26px;
  opacity: 0;
  animation: aparecer 2s ease forwards;
  animation-delay: 7s;
}

/* ANIMACIONES */
@keyframes fadeOut {
  to { opacity: 0; transform: scale(0.8); }
}

@keyframes fuegoAnim {
  0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
  100% { opacity: 0; transform: translateX(-50%) scale(0.5); }
}

@keyframes aparecer {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <img id="fuego" src="fuego.gif">
  <img id="rosa" src="rosa.png">
  <div id="texto">Feliç Sant Jordi, amor meu ❤️🌹</div>
</div>

</body>
</html>
