<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
  position: relative;
  z-index: 1;
}

/* MENSAJE */
#mensaje {
  font-size: 22px;
  color: orange;
  text-shadow: 0 0 10px red;
  margin-bottom: 10px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  max-width: 280px;
  display: block;
  margin: 0 auto;
}

/* BOTÓN */
#boton {
  margin-top: 16px;
  padding: 12px 24px;
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(180deg, #ff4d4d, #990000);
  border: none;
  border-radius: 12px;
  color: white;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 12px rgba(255, 0, 0, 0.6);
  transition: transform 0.1s ease, box-shadow 0.2s ease;
}

#boton:hover {
  box-shadow: 0 0 18px rgba(255, 80, 80, 0.9);
}

#boton:active {
  transform: scale(0.95);
}

/* CONTADOR */
#contador {
  margin-top: 12px;
  font-size: 18px;
  display: none;
}

/* ROSA */
#rosa {
  width: 80%;
  max-width: 220px;
  opacity: 0;
  display: block;
  margin: 20px auto 0;
  filter: drop-shadow(0 0 10px red);
  transition: opacity 0.8s ease;
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
  transition: opacity 0.8s ease;
}

/* TIEMPO */
#tiempo {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0;
  transition: opacity 0.8s ease;
}

/* PERGAMINO */
#pergamino {
  position: fixed;
  inset: 0;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 30px;
  opacity: 0;
  pointer-events: none; /* ESTO ARREGLA EL BUG */
  transition: opacity 0.6s ease;
  z-index: 999;
}

#pergamino.visible {
  opacity: 1;
  pointer-events: auto;
}

#contenidoPergamino {
  max-width: 500px;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>

  <img id="dragon" src="dragon.gif" alt="Dragón">

  <button id="boton" type="button">⚔️ ATACAR</button>

  <div id="contador">Golpea al dragón: 0 / 5</div>

  <img id="rosa" src="rosa.png" alt="Rosa">

  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>

  <div id="tiempo">Tiempo: 10</div>
</div>

<div id="pergamino">
  <div id="contenidoPergamino">
    🏰 Has completado la misión…<br><br>
    Aquí irá tu mensaje final.
  </div>
</div>

<script>
const mensaje = document.getElementById("mensaje");
const boton = document.getElementById("boton");
const contador = document.getElementById("contador");
const dragon = document.getElementById("dragon");
const rosa = document.getElementById("rosa");
const texto = document.getElementById("texto");
const tiempoDiv = document.getElementById("tiempo");
const pergamino = document.getElementById("pergamino");

let golpes = 0;
let tiempo = 10;
let intervalo = null;

// 1. Aparece mensaje
setTimeout(() => {
  mensaje.style.opacity = "1";
}, 1500);

// 2. Empieza juego
setTimeout(() => {
  mensaje.style.opacity = "0";
  boton.style.display = "inline-block";
  contador.style.display = "block";
}, 3500);

// 3. Ataque
boton.addEventListener("click", () => {
  golpes++;
  contador.textContent = `Golpea al dragón: ${golpes} / 5`;

  if (golpes >= 5) {
    boton.style.display = "none";
    contador.style.display = "none";
    dragon.style.display = "none";

    rosa.style.opacity = "1";
    texto.style.opacity = "1";

    setTimeout(() => {
      tiempoDiv.style.opacity = "1";

      intervalo = setInterval(() => {
        tiempo--;
        tiempoDiv.textContent = `Tiempo: ${tiempo}`;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          pergamino.classList.add("visible");
        }
      }, 1000);
    }, 1000);
  }
});
</script>

</body>
</html>
