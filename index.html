<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
  color: white;
}

.container {
  position: relative;
  width: 90%;
  max-width: 300px;
  text-align: center;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  position: relative;
  z-index: 1;
}

/* TEXTO TIPO FUEGO */
#mensaje {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.5);
  font-size: 24px;
  font-weight: bold;
  color: orange;
  text-shadow: 0 0 10px red, 0 0 20px orange;
  opacity: 0;
  z-index: 2;
}

/* ROSA */
#rosa {
  width: 80%;
  opacity: 0;
  position: relative;
  z-index: 3;
  filter: drop-shadow(0 0 10px red);
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
}

/* ANIMACIONES */
@keyframes aparecerMensaje {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>
  <img id="rosa" src="rosa.png">
  <div id="texto">Feliç Sant Jordi, Andrea ❤️🌹</div>
</div>

<script>

// 1. Aparece mensaje (como fuego)
setTimeout(() => {
  let mensaje = document.getElementById("mensaje");
  mensaje.style.animation = "aparecerMensaje 2s forwards";
}, 2500);

// 2. Desaparece dragón
setTimeout(() => {
  document.getElementById("dragon").style.opacity = 0;
}, 3500);

// 3. Aparece rosa
setTimeout(() => {
  document.getElementById("rosa").style.opacity = 1;
}, 4500);

// 4. Texto final
setTimeout(() => {
  document.getElementById("texto").style.opacity = 1;
}, 6000);

</script>

</body>
</html>
