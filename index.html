<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  color: white;
  overflow: hidden;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
  position: relative;
  z-index: 3;
}

/* MENSAJE */
#mensaje {
  font-size: 20px;
  color: orange;
  text-shadow: 0 0 10px red;
  margin-bottom: 10px;
  opacity: 0;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  max-width: 260px;
}

/* BOTÓN */
#boton {
  padding: 12px 20px;
  font-size: 16px;
  background: linear-gradient(180deg, #ff4d4d, #990000);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 10px red;
  position: absolute; /* 👈 CLAVE */
  left: 50%;
  transform: translateX(-50%);
}

/* CONTADOR */
#contador {
  margin-top: 10px;
  font-size: 16px;
  display: none;
}

/* TEXTO FINAL */
#texto {
  margin-top: 10px;
  font-size: 20px;
  opacity: 0;
}

/* FOTO */
#foto {
  width: 85%;
  border-radius: 12px;
  margin-top: 10px;
  opacity: 0;
}

/* TEXTO AMOR */
#amor {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0;
}

/* TIEMPO */
#tiempo {
  margin-top: 10px;
  font-size: 16px;
  opacity: 0;
}

/* FONDO */
#fondoRosas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url("rosa.jpg");
  background-size: cover;
  background-position: center;
  opacity: 0;
  z-index: 2;
}

/* PERGAMINO */
#pergamino {
  position: fixed;
  inset: 0;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 20px;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
}

#pergamino.visible {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>

<body>

<div class="container" id="zona">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>

  <img id="dragon" src="dragon.gif">

  <button id="boton">⚔️ ATACAR</button>

  <div id="contador">Golpea al dragón: 0 / 5</div>

  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>

  <img id="foto" src="foto.jpeg">

  <div id="amor">Te amo muchoooo ❤️</div>

  <div id="tiempo">Tiempo: 10</div>
</div>

<div id="fondoRosas"></div>

<div id="pergamino">
  🏰 Has completado la misión…<br><br>
  (mensaje final 😏)
</div>

<script>
const boton = document.getElementById("boton");
const zona = document.getElementById("zona");

let golpes = 0;

// mensaje
setTimeout(() => {
  document.getElementById("mensaje").style.opacity = "1";
}, 1500);

// juego
setTimeout(() => {
  document.getElementById("mensaje").style.opacity = "0";
  boton.style.display = "block";
  document.getElementById("contador").style.display = "block";
}, 3000);

// mover dentro del contenedor
function moverBoton() {
  const zonaRect = zona.getBoundingClientRect();
  const btnRect = boton.getBoundingClientRect();

  const maxX = zonaRect.width - btnRect.width;
  const maxY = zonaRect.height - btnRect.height;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  boton.style.left = x + "px";
  boton.style.top = y + "px";
}

// click
boton.addEventListener("click", () => {
  golpes++;
  document.getElementById("contador").textContent =
    `Golpea al dragón: ${golpes} / 5`;

  moverBoton();

  if (golpes >= 5) {
    boton.style.display = "none";
    document.getElementById("dragon").style.display = "none";

    document.getElementById("fondoRosas").style.opacity = "1";
    document.getElementById("texto").style.opacity = "1";
    document.getElementById("foto").style.opacity = "1";
    document.getElementById("amor").style.opacity = "1";

    let tiempo = 10;
    const t = document.getElementById("tiempo");
    t.style.opacity = "1";

    const interval = setInterval(() => {
      tiempo--;
      t.textContent = "Tiempo: " + tiempo;

      if (tiempo <= 0) {
        clearInterval(interval);
        document.getElementById("pergamino").classList.add("visible");
      }
    }, 1000);
  }
});
</script>

</body>
</html>
