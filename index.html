<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #000000 30%, #1a0000 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Georgia', serif;
  color: white;
}

/* CONTENEDOR */
.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  cursor: pointer;
  transition: transform 0.1s;
}

/* MENSAJE */
#mensaje {
  position: absolute;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: bold;
  color: orange;
  text-shadow: 0 0 10px red, 0 0 20px orange;
  opacity: 0;
}

/* CONTADOR */
#contador {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0;
}

/* TIEMPO */
#tiempo {
  font-size: 16px;
  opacity: 0;
}

/* ROSA */
#rosa {
  width: 70%;
  opacity: 0;
  margin-top: 20px;
  filter: drop-shadow(0 0 15px red);
  border-radius: 10px;
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 20px;
  opacity: 0;
  line-height: 1.4;
}

/* PERGAMINO BONITO */
#pergamino {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: linear-gradient(#f5deb3, #e6c79c);
  color: #3b2a1a;
  padding: 25px;
  border-radius: 15px;
  width: 80%;
  max-width: 320px;
  text-align: center;
  font-size: 18px;
  opacity: 0;
  box-shadow: 0 0 30px rgba(0,0,0,0.7);
  border: 3px solid #d4a373;
  transition: all 0.5s ease;
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>
  <div id="contador">Golpea al dragón: 0 / 5</div>
  <div id="tiempo">Tiempo: 10</div>
  <img id="rosa" src="rosa.png">
  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>
</div>

<div id="pergamino">
  🏰 Has superado la misión…<br><br>
  Pero lo mejor de esta historia…<br>
  es que empieza contigo ❤️
</div>

<script>

let golpes = 0;
let juegoActivo = false;
let tiempo = 10;
let intervalo;

// mensaje inicial
setTimeout(() => {
  mensaje.style.opacity = 1;
}, 2000);

// empieza juego
setTimeout(() => {
  mensaje.style.opacity = 0;
  contador.style.opacity = 1;
  tiempoDiv.style.opacity = 1;
  juegoActivo = true;

  intervalo = setInterval(() => {
    tiempo--;
    tiempoDiv.innerText = "Tiempo: " + tiempo;

    if (tiempo <= 0) {
      clearInterval(intervalo);
      mostrarPergamino();
    }
  }, 1000);

}, 4000);

const dragon = document.getElementById("dragon");
const mensaje = document.getElementById("mensaje");
const contador = document.getElementById("contador");
const tiempoDiv = document.getElementById("tiempo");

// clicks
dragon.addEventListener("click", () => {
  if (!juegoActivo) return;

  golpes++;
  contador.innerText = "Golpea al dragón: " + golpes + " / 5";

  dragon.style.transform = "scale(0.9)";
  setTimeout(() => dragon.style.transform = "scale(1)", 100);

  if (golpes >= 5) {
    juegoActivo = false;
    clearInterval(intervalo);

    dragon.style.opacity = 0;

    setTimeout(() => rosa.style.opacity = 1, 500);
    setTimeout(() => texto.style.opacity = 1, 1500);
    setTimeout(() => mostrarPergamino(), 3500);
  }
});

function mostrarPergamino() {
  document.getElementById("pergamino").style.opacity = 1;
}

</script>

</body>
</html>
