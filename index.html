<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Georgia, serif;
  color: white;
}

.container {
  text-align: center;
  width: 90%;
  max-width: 320px;
}

/* DRAGÓN */
#dragon {
  width: 100%;
}

/* MENSAJE */
#mensaje {
  font-size: 22px;
  color: orange;
  text-shadow: 0 0 10px red;
  margin-bottom: 10px;
  opacity: 0;
}

/* BOTÓN */
#boton {
  margin-top: 10px;
  padding: 12px 20px;
  font-size: 18px;
  background: linear-gradient(red, darkred);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  display: none;
  box-shadow: 0 0 10px red;
  transition: transform 0.1s;
}

#boton:active {
  transform: scale(0.9);
}

/* CONTADOR */
#contador {
  margin-top: 10px;
  font-size: 18px;
  display: none;
}

/* ROSA */
#rosa {
  width: 80%;
  opacity: 0;
  margin-top: 20px;
  filter: drop-shadow(0 0 10px red);
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
}

/* TIEMPO */
#tiempo {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0;
}

/* PERGAMINO */
#pergamino {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 30px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="container">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>

  <img id="dragon" src="dragon.gif">

  <button id="boton">⚔️ ATACAR</button>

  <div id="contador">Golpea al dragón: 0 / 5</div>

  <img id="rosa" src="rosa.png">

  <div id="texto">Te has salvado a ti misma,<br><b>Pocoyo ❤️🌹</b></div>

  <div id="tiempo">Tiempo: 10</div>
</div>

<div id="pergamino">
  🏰 Has completado la misión…<br><br>
  (Aquí pondremos tu mensaje final 😏)
</div>

<script>
const mensaje = document.getElementById("mensaje");
const boton = document.getElementById("boton");
const contador = document.getElementById("contador");
const rosa = document.getElementById("rosa");
const texto = document.getElementById("texto");
const tiempoDiv = document.getElementById("tiempo");
const pergamino = document.getElementById("pergamino");

let golpes = 0;
let tiempo = 10;
let intervalo;

// 1. aparece mensaje
setTimeout(() => {
  mensaje.style.opacity = 1;
}, 1500);

// 2. empieza juego
setTimeout(() => {
  mensaje.style.opacity = 0;
  boton.style.display = "inline-block";
  contador.style.display = "block";
}, 3500);

// 3. atacar
boton.addEventListener("click", () => {
  golpes++;
  contador.innerText = "Golpea al dragón: " + golpes + " / 5";

  // animación botón
  boton.style.transform = "scale(0.9)";
  setTimeout(() => boton.style.transform = "scale(1)", 100);

  if (golpes >= 5) {
    boton.style.display = "none";
    contador.style.display = "none";

    document.getElementById("dragon").style.display = "none";

    rosa.style.opacity = 1;
    texto.style.opacity = 1;

    // contador después
    setTimeout(() => {
      tiempoDiv.style.opacity = 1;

      intervalo = setInterval(() => {
        tiempo--;
        tiempoDiv.innerText = "Tiempo: " + tiempo;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          pergamino.style.opacity = 1;
        }
      }, 1000);

    }, 1000);
  }
});
</script>

</body>
</html>
