<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
  color: white;
}

.container {
  position: relative;
  width: 90%;
  max-width: 300px;
  text-align: center;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  cursor: pointer;
  transition: transform 0.1s;
}

/* MENSAJE */
#mensaje {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: bold;
  color: orange;
  text-shadow: 0 0 10px red;
  opacity: 0;
}

/* CONTADOR */
#contador {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0;
}

/* ROSA */
#rosa {
  width: 80%;
  opacity: 0;
  filter: drop-shadow(0 0 10px red);
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>
  <div id="contador">Golpea al dragón: 0 / 5</div>
  <img id="rosa" src="rosa.png">
  <div id="texto">Te has salvado a ti misma, Pocoyo ❤️🌹</div>
</div>

<script>

let golpes = 0;
let juegoActivo = false;

// 1. Aparece mensaje
setTimeout(() => {
  document.getElementById("mensaje").style.opacity = 1;
}, 2000);

// 2. Empieza el juego
setTimeout(() => {
  document.getElementById("mensaje").style.opacity = 0;
  document.getElementById("contador").style.opacity = 1;
  juegoActivo = true;
}, 4000);

// 3. Click en dragón
document.getElementById("dragon").addEventListener("click", () => {
  if (!juegoActivo) return;

  golpes++;
  document.getElementById("contador").innerText = "Golpea al dragón: " + golpes + " / 5";

  // efecto golpe
  let dragon = document.getElementById("dragon");
  dragon.style.transform = "scale(0.9)";
  setTimeout(() => {
    dragon.style.transform = "scale(1)";
  }, 100);

  // ganar
  if (golpes >= 5) {
    juegoActivo = false;

    // desaparece dragón
    dragon.style.opacity = 0;

    // aparece rosa
    setTimeout(() => {
      document.getElementById("rosa").style.opacity = 1;
    }, 500);

    // texto final
    setTimeout(() => {
      document.getElementById("texto").style.opacity = 1;
    }, 1500);
  }
});

</script>

</body>
</html>
