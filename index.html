<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sant Jordi ❤️</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #000000 40%, #1a0000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: Georgia, serif;
  color: white;
}

.container {
  position: relative;
  width: 90%;
  max-width: 320px;
  text-align: center;
}

/* DRAGÓN */
#dragon {
  width: 100%;
  cursor: pointer;
  transition: transform 0.1s;
}

#mensaje {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 22px;
  font-weight: bold;
  color: orange;
  text-shadow: 0 0 10px red;
  opacity: 0;
  pointer-events: none;
}

/* CONTADOR GOLPES */
#contador {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0;
}

/* TEMPORIZADOR */
#tiempo {
  margin-top: 15px;
  font-size: 18px;
  opacity: 0;
}

/* ROSA */
#rosa {
  width: 80%;
  opacity: 0;
  margin-top: 20px;
  filter: drop-shadow(0 0 10px red);
}

/* TEXTO FINAL */
#texto {
  margin-top: 20px;
  font-size: 22px;
  opacity: 0;
}

/* PERGAMINO FULL */
#pergamino {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f5deb3;
  color: #3b2a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  font-size: 22px;
  padding: 30px;
  opacity: 0;
  z-index: 999;
}
</style>
</head>

<body>

<div class="container">
  <img id="dragon" src="dragon.gif">
  <div id="mensaje">SALVA A LA PRINCESA!! 🔥</div>
  <div id="contador">Golpea al dragón: 0 / 5</div>
  <div id="tiempo">Tiempo: 10</div>
  <img id="rosa" src="rosa.png">
  <div id="texto">Te has salvado a ti misma, Pocoyo ❤️🌹</div>
</div>

<div id="pergamino">
  <div>
    🏰 Has completado la misión…<br><br>
    (Aquí pondremos tu mensaje final 😏)
  </div>
</div>

<script>

let golpes = 0;
let juegoActivo = false;
let tiempo = 10;
let intervalo;

// 1. MENSAJE INICIAL
setTimeout(() => {
  mensaje.style.opacity = 1;
}, 2000);

// 2. EMPIEZA JUEGO
setTimeout(() => {
  mensaje.style.opacity = 0;
  contador.style.opacity = 1;
  juegoActivo = true;
}, 4000);

// CLICK DRAGÓN
dragon.addEventListener("click", golpear);
dragon.addEventListener("touchstart", golpear);

function golpear() {
  if (!juegoActivo) return;

  golpes++;
  contador.innerText = "Golpea al dragón: " + golpes + " / 5";

  dragon.style.transform = "scale(0.9)";
  setTimeout(() => dragon.style.transform = "scale(1)", 100);

  if (golpes >= 5) {
    juegoActivo = false;

    // ocultar dragón + contador
    dragon.style.display = "none";
    contador.style.display = "none";

    // mostrar rosa + texto
    rosa.style.opacity = 1;
    texto.style.opacity = 1;

    // AHORA empieza contador (bien colocado)
    setTimeout(() => {
      tiempo.style.opacity = 1;

      intervalo = setInterval(() => {
        tiempo--;
        document.getElementById("tiempo").innerText = "Tiempo: " + tiempo;

        if (tiempo <= 0) {
          clearInterval(intervalo);
          mostrarPergamino();
        }
      }, 1000);

    }, 1000);
  }
}

// PERGAMINO FINAL
function mostrarPergamino() {
  document.getElementById("pergamino").style.opacity = 1;
}

</script>

</body>
</html>
